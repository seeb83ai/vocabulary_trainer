<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary — Vocab Trainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Navigation -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-4xl mx-auto px-4 py-3 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
      <span class="text-xl font-bold text-gray-800">词汇训练 · Vocab Trainer</span>
      <div class="flex gap-4 items-center">
        <a href="/" class="text-gray-500 hover:text-gray-800 font-medium">Train</a>
        <a href="/vocab" class="text-blue-600 font-medium border-b-2 border-blue-600 pb-0.5">Vocabulary</a>
        <a href="/mismatches" class="text-gray-500 hover:text-gray-800 font-medium">Mismatches</a>
        <a href="/stats" class="text-gray-500 hover:text-gray-800 font-medium">Stats</a>
        <button id="logout-btn" onclick="logout()" class="hidden text-gray-400 hover:text-gray-700 text-sm font-medium transition">Sign out</button>
      </div>
    </div>
  </nav>

  <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-8 space-y-6">

    <!-- Add / Edit form -->
    <div id="word-form-panel" class="bg-white rounded-2xl shadow p-6">
      <h2 id="form-title" class="text-lg font-semibold text-gray-800 mb-4">Add Word</h2>
      <form id="word-form" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Chinese</label>
            <input id="form-zh" type="text" placeholder="e.g. 你好"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Pinyin</label>
            <input id="form-pinyin" type="text" placeholder="e.g. nǐ hǎo"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <div>
          <button type="button" id="translate-btn"
            class="hidden text-sm text-blue-600 hover:text-blue-800 font-medium px-3 py-1 rounded-lg border border-blue-200 hover:border-blue-400 transition">
            Auto-translate
          </button>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">English Translation(s)</label>
          <div id="en-inputs-container" class="space-y-2"></div>
          <button type="button" id="add-en-btn"
            class="mt-2 text-sm text-blue-600 hover:text-blue-800 font-medium">
            + Add translation
          </button>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tags</label>
          <div id="form-tags" class="flex flex-wrap gap-1 mb-2"></div>
          <div class="relative">
            <input id="form-tag-input" type="text" placeholder="Add tag…"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
              autocomplete="off">
            <div id="tag-autocomplete" class="hidden absolute z-10 w-full bg-white border border-gray-300 rounded-lg shadow-lg mt-1 max-h-40 overflow-y-auto"></div>
          </div>
        </div>

        <div id="start-training-row" class="flex items-center gap-2">
          <input type="checkbox" id="form-start-training"
            class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
          <label for="form-start-training" class="text-sm text-gray-700">Start training immediately</label>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2 rounded-lg transition">
            Save
          </button>
          <button type="button" id="form-cancel-btn"
            class="hidden text-gray-600 hover:text-gray-800 font-medium px-4 py-2 rounded-lg border border-gray-300 hover:border-gray-400 transition">
            Cancel
          </button>
        </div>
      </form>
    </div>

    <!-- Search & list -->
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <div class="px-4 sm:px-6 py-4 border-b border-gray-200 space-y-3">
        <div class="flex items-center gap-3">
          <h2 class="text-lg font-semibold text-gray-800 flex-1">Vocabulary List</h2>
          <input id="search-input" type="search" placeholder="Search…"
            class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-36 sm:w-52">
        </div>
        <div class="flex flex-wrap gap-2">
          <button id="hide-unseen-btn"
            class="px-3 py-1.5 rounded-lg border text-sm font-medium transition border-blue-400 bg-blue-50 text-blue-600">
            Hide Unseen
          </button>
          <button id="review-filter-btn"
            class="px-3 py-1.5 rounded-lg border text-sm font-medium transition border-gray-300 text-gray-600 hover:bg-gray-100">
            Needs Review
          </button>
          <button id="due-today-btn"
            class="px-3 py-1.5 rounded-lg border text-sm font-medium transition border-gray-300 text-gray-600 hover:bg-gray-100">
            Due Today
          </button>
          <button id="due-tomorrow-btn"
            class="px-3 py-1.5 rounded-lg border text-sm font-medium transition border-gray-300 text-gray-600 hover:bg-gray-100">
            Due Tomorrow
          </button>
        </div>
      </div>
      <div id="filter-tier-bar" class="px-4 sm:px-6 py-2 border-b border-gray-200 flex items-center gap-2 flex-wrap">
        <span class="text-xs text-gray-500 font-medium mr-1">Level:</span>
      </div>
      <div id="filter-tags-bar" class="hidden px-4 sm:px-6 py-2 border-b border-gray-200 flex items-center gap-2 flex-wrap">
        <span class="text-xs text-gray-500 font-medium mr-1">Tags:</span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-600 uppercase text-xs tracking-wider">
            <tr>
              <th class="py-3 px-4 text-left cursor-pointer select-none hover:bg-gray-100" data-sort="zh">Chinese <span class="sort-indicator"></span></th>
              <th class="py-3 px-4 text-left cursor-pointer select-none hover:bg-gray-100" data-sort="pinyin">Pinyin <span class="sort-indicator"></span></th>
              <th class="py-3 px-4 text-left cursor-pointer select-none hover:bg-gray-100" data-sort="en">English <span class="sort-indicator"></span></th>
              <th class="py-3 px-4 text-left cursor-pointer select-none hover:bg-gray-100" data-sort="accuracy">Level <span class="sort-indicator"></span></th>
              <th class="py-3 px-4 text-left cursor-pointer select-none hover:bg-gray-100" data-sort="due_date">Due <span class="sort-indicator"></span></th>
              <th class="py-3 px-4 text-left">Actions</th>
            </tr>
          </thead>
          <tbody id="words-tbody"></tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="px-4 sm:px-6 py-3 border-t border-gray-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 text-sm text-gray-600">
        <div class="flex items-center gap-1 min-w-0">
          <button id="prev-btn"
            class="px-3 py-1.5 rounded-lg border border-gray-300 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition flex-none">
            ←
          </button>
          <span id="page-numbers" class="flex items-center gap-0.5 flex-wrap min-w-0"></span>
          <button id="next-page-btn"
            class="px-3 py-1.5 rounded-lg border border-gray-300 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition flex-none">
            →
          </button>
        </div>
        <div class="flex items-center gap-3 flex-none">
          <span id="page-total" class="text-gray-500"></span>
          <select id="per-page-select" class="border border-gray-300 rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="20">20 / page</option>
            <option value="50">50 / page</option>
            <option value="100">100 / page</option>
          </select>
        </div>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
  <script src="vocab.js"></script>
</body>
</html>
