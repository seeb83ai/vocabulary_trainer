<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Trainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Navigation -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-2xl mx-auto px-4 py-3 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
      <span class="text-xl font-bold text-gray-800">词汇训练 · Vocab Trainer</span>
      <div class="flex gap-4 items-center">
        <a href="/" class="text-blue-600 font-medium border-b-2 border-blue-600 pb-0.5">Train</a>
        <a href="/vocab" class="text-gray-500 hover:text-gray-800 font-medium">Vocabulary</a>
        <a href="/mismatches" class="text-gray-500 hover:text-gray-800 font-medium">Mismatches</a>
        <a href="/stats" class="text-gray-500 hover:text-gray-800 font-medium">Stats</a>
        <button id="logout-btn" onclick="logout()" class="hidden text-gray-400 hover:text-gray-700 text-sm font-medium transition">Sign out</button>
      </div>
    </div>
  </nav>

  <!-- Stats bar -->
  <div class="bg-blue-50 border-b border-blue-100">
    <div class="max-w-2xl mx-auto px-4 py-2 flex gap-6 text-sm text-blue-700">
      <span class="flex flex-col sm:flex-row sm:gap-1"><span>Due today:</span> <strong id="stats-due">—</strong></span>
      <span class="flex flex-col sm:flex-row sm:gap-1"><span>Total words:</span> <strong id="stats-total">—</strong></span>
      <span class="flex flex-col sm:flex-row sm:gap-1"><span>New today:</span> <strong id="stats-new">—</strong></span>
    </div>
  </div>

  <!-- Mode selector -->
  <div class="bg-white border-b border-gray-200">
    <!-- Desktop: all chips -->
    <div class="hidden sm:flex max-w-2xl mx-auto px-4 py-2 gap-2 flex-wrap">
      <button data-mode="random"          class="mode-btn px-3 py-1 rounded-full text-sm font-medium transition">Random</button>
      <button data-mode="en_to_zh"        class="mode-btn px-3 py-1 rounded-full text-sm font-medium transition">EN → ZH</button>
      <button data-mode="zh_to_en"        class="mode-btn px-3 py-1 rounded-full text-sm font-medium transition">ZH → EN</button>
      <button data-mode="zh_pinyin_to_en" class="mode-btn px-3 py-1 rounded-full text-sm font-medium transition">ZH + Pinyin → EN</button>
    </div>
    <!-- Mobile: selected chip + edit trigger -->
    <div class="flex sm:hidden max-w-2xl mx-auto px-4 py-2 items-center gap-2">
      <span id="mode-mobile-label" class="px-3 py-1 rounded-full text-sm font-medium bg-blue-600 text-white"></span>
      <button id="open-filter-overlay" class="ml-auto text-xs text-gray-500 border border-gray-200 rounded-full px-2.5 py-1 hover:bg-gray-50 transition">&#9660;&nbsp;Edit</button>
    </div>
  </div>

  <!-- Tag filter -->
  <div id="tag-filter-bar" class="hidden bg-white border-b border-gray-200">
    <!-- Desktop: all tag chips -->
    <div id="tag-chips-desktop" class="hidden sm:flex max-w-2xl mx-auto px-4 py-2 gap-2 flex-wrap items-center">
      <span class="text-xs text-gray-500 font-medium mr-1">Tags:</span>
    </div>
    <!-- Mobile: selected tags summary + edit trigger -->
    <div class="flex sm:hidden max-w-2xl mx-auto px-4 py-2 items-center gap-2">
      <span class="text-xs text-gray-500 font-medium shrink-0">Tags:</span>
      <div id="tag-mobile-summary" class="flex gap-1.5 flex-nowrap overflow-x-auto flex-1 min-w-0 py-0.5"></div>
      <button id="open-filter-overlay-tags" class="shrink-0 text-xs text-gray-500 border border-gray-200 rounded-full px-2.5 py-1 hover:bg-gray-50 transition">&#9660;&nbsp;Edit</button>
    </div>
  </div>

  <!-- Main content -->
  <main class="flex-1 flex items-start justify-center px-4 py-10">
    <div class="w-full max-w-lg">

      <!-- Empty state -->
      <div id="empty-state" class="hidden text-center bg-white rounded-2xl shadow p-10">
        <div class="text-5xl mb-4">📚</div>
        <h2 class="text-xl font-semibold text-gray-700 mb-2">No vocabulary yet</h2>
        <p class="text-gray-500 mb-6">Add some words to start training.</p>
        <a href="/vocab" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2 rounded-lg transition">
          Add Vocabulary
        </a>
      </div>

      <!-- Error state -->
      <div id="error-state" class="hidden text-center bg-white rounded-2xl shadow p-10">
        <div class="text-4xl mb-4">⚠️</div>
        <p id="error-msg" class="text-red-600"></p>
      </div>

      <!-- Card area -->
      <div id="card-area" class="hidden">
        <div class="bg-white rounded-2xl shadow p-8">
          <div id="mode-label" class="text-sm font-medium text-blue-600 uppercase tracking-wider mb-6"></div>

          <div class="flex items-center gap-3 mb-3">
            <div id="prompt-word" class="text-4xl font-bold text-gray-800 break-words flex-1"></div>
            <button id="play-btn" type="button" class="hidden text-2xl text-gray-400 hover:text-blue-500 transition leading-none shrink-0" title="Read aloud">🔊</button>
          </div>
          <div id="pinyin-hint" class="hidden text-xl text-gray-500 mb-6"></div>

          <form id="answer-form" class="mt-6">
            <input
              id="answer-input"
              type="text"
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
              placeholder="Type your answer…"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4"
            >
            <button
              type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-3 rounded-xl text-lg transition"
            >
              Submit
            </button>
          </form>
        </div>
      </div>

      <!-- Result area -->
      <div id="result-area" class="hidden">
        <div class="bg-white rounded-2xl shadow p-8 text-center">
          <div id="result-icon" class="text-3xl font-bold mb-4"></div>

          <div id="word-breakdown" class="hidden mb-2"></div>
          <button id="add-translation-btn" class="hidden"></button>

          <div class="flex justify-center gap-6 text-sm text-gray-500 mb-8">
            <span id="next-due-info"></span>
            <span id="attempt-stats"></span>
          </div>

          <button
            id="next-btn"
            class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-3 rounded-xl text-lg transition"
          >
            Next →
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- Mobile filter overlay (bottom sheet) -->
  <div id="filter-overlay" class="hidden fixed inset-0 z-50 sm:hidden" role="dialog" aria-modal="true">
    <div id="filter-overlay-backdrop" class="absolute inset-0 bg-black/50"></div>
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl shadow-xl max-h-[80vh] overflow-y-auto">
      <div class="p-5">
        <div class="mb-5">
          <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Quiz Mode</div>
          <div class="flex flex-wrap gap-2">
            <button data-mode="random"          class="overlay-mode-btn px-4 py-2 rounded-full text-sm font-medium transition">Random</button>
            <button data-mode="en_to_zh"        class="overlay-mode-btn px-4 py-2 rounded-full text-sm font-medium transition">EN → ZH</button>
            <button data-mode="zh_to_en"        class="overlay-mode-btn px-4 py-2 rounded-full text-sm font-medium transition">ZH → EN</button>
            <button data-mode="zh_pinyin_to_en" class="overlay-mode-btn px-4 py-2 rounded-full text-sm font-medium transition">ZH + Pinyin → EN</button>
          </div>
        </div>
        <div id="overlay-tags-section" class="hidden">
          <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Tags</div>
          <div id="overlay-tag-chips" class="flex flex-wrap gap-2"></div>
        </div>
        <button id="filter-overlay-close" class="mt-5 w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-xl text-sm transition">Done</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="train.js"></script>
</body>
</html>
