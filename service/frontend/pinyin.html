{{template "layout" .}}
{{define "content"}}

  <!-- Stats bar -->
  <div class="bg-purple-50 border-b border-purple-100">
    <div class="max-w-2xl mx-auto px-4 py-2 flex gap-6 text-sm text-purple-700">
      <span class="flex flex-col sm:flex-row sm:gap-1"><span data-i18n="pinyin.dueToday">Due today:</span> <strong id="stats-due">—</strong></span>
      <span class="flex flex-col sm:flex-row sm:gap-1"><span data-i18n="pinyin.totalSounds">Total sounds:</span> <strong id="stats-total">—</strong></span>
    </div>
  </div>

  <!-- Tag filter -->
  <div id="tag-filter-bar" class="bg-white border-b border-gray-200">
    <div id="tag-chips" class="max-w-2xl mx-auto px-4 py-2 flex gap-2 flex-wrap items-center">
      <span class="text-xs text-gray-500 font-medium mr-1" data-i18n="pinyin.group">Group:</span>
    </div>
  </div>

  <!-- Main content -->
  <main class="flex-1 flex items-start justify-center px-4 py-10">
    <div class="w-full max-w-lg">

      <!-- Empty state -->
      <div id="empty-state" class="hidden text-center bg-white rounded-2xl shadow p-10">
        <div class="text-5xl mb-4">🔊</div>
        <h2 class="text-xl font-semibold text-gray-700 mb-2" data-i18n="pinyin.noSounds">No pinyin sounds imported</h2>
        <p class="text-gray-500 mb-6" data-i18n="pinyin.noSoundsHelp">Run <code class="bg-gray-100 px-2 py-1 rounded text-sm">make import-pinyin</code> to import audio files.</p>
      </div>

      <!-- Success state -->
      <div id="success-state" class="hidden text-center bg-white rounded-2xl shadow p-10">
        <div class="text-5xl mb-4">🎉</div>
        <h2 class="text-xl font-semibold text-gray-700 mb-2" data-i18n="pinyin.allDone">All done for now!</h2>
        <p class="text-gray-500 mb-6" data-i18n="pinyin.allDoneMsg">No more pinyin sounds due. Come back later for review.</p>
      </div>

      <!-- Error state -->
      <div id="error-state" class="hidden text-center bg-white rounded-2xl shadow p-10">
        <div class="text-4xl mb-4">⚠️</div>
        <p id="error-msg" class="text-red-600"></p>
      </div>

      <!-- Card area -->
      <div id="card-area" class="hidden">
        <div class="bg-white rounded-2xl shadow p-8 text-center">
          <div id="mode-label" class="text-sm font-medium text-purple-600 uppercase tracking-wider mb-6"></div>

          <!-- Play button -->
          <button id="play-btn" type="button" class="text-6xl text-gray-400 hover:text-purple-500 transition mb-6 mx-auto block" data-i18n-title="pinyin.playAudio" title="Play audio">
            🔊
          </button>
          <p class="text-sm text-gray-400 mb-6" data-i18n="pinyin.listenHint">Listen and identify the pinyin sound</p>

          <!-- Multiple choice options -->
          <div id="mc-options" class="hidden grid grid-cols-2 gap-3 mb-4">
          </div>

          <!-- Type answer input -->
          <form id="answer-form" class="hidden mt-4">
            <input
              id="answer-input"
              type="text"
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
              placeholder="Type pinyin, e.g. ba1"
              data-i18n-placeholder="pinyin.placeholder"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-purple-500 mb-4 text-center"
            >
            <button
              type="submit"
              class="w-full bg-purple-600 hover:bg-purple-700 active:bg-purple-800 text-white font-semibold py-3 rounded-xl text-lg transition"
              data-i18n="pinyin.submit"
            >
              Submit
            </button>
          </form>
        </div>
      </div>

      <!-- Result area -->
      <div id="result-area" class="hidden">
        <div class="bg-white rounded-2xl shadow p-8 text-center">
          <div id="result-icon" class="text-3xl font-bold mb-4"></div>

          <div id="result-correct-answer" class="text-2xl font-bold text-gray-800 mb-2"></div>
          <button id="result-play-btn" type="button" class="text-2xl text-gray-400 hover:text-purple-500 transition mb-2" data-i18n-title="pinyin.replay" title="Replay">🔊</button>

          <!-- Tone variants -->
          <div id="tone-variants" class="hidden flex justify-center gap-2 flex-wrap mb-4"></div>

          <div id="result-your-answer" class="hidden text-gray-500 mb-4"></div>
          <div id="result-confusion" class="hidden text-sm text-orange-600 mb-4"></div>

          <div class="flex justify-center gap-6 text-sm text-gray-500 mb-8 mt-3">
            <div class="text-center">
              <span id="next-due-info"></span>
              <div id="bucket-info" class="hidden text-xs text-gray-400 mt-0.5"></div>
            </div>
            <div class="text-center">
              <span id="attempt-stats"></span>
            </div>
          </div>

          <button
            id="next-btn"
            class="w-full bg-purple-600 hover:bg-purple-700 active:bg-purple-800 text-white font-semibold py-3 rounded-xl text-lg transition"
            data-i18n="pinyin.next"
          >
            Next →
          </button>
        </div>
      </div>

    </div>
  </main>

{{end}}
