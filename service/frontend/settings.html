{{template "layout" .}}
{{define "content"}}

  <main class="flex-1 max-w-2xl w-full mx-auto px-4 py-8 space-y-6">

    <!-- Account info -->
    <div class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Account</h2>
      <p class="text-sm text-gray-500 mb-1">Signed in as</p>
      <p id="account-email" class="text-base font-medium text-gray-800">—</p>
    </div>

    <!-- Change password -->
    <div class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Change Password</h2>

      <div id="pw-success" class="hidden mb-4 text-sm text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2">
        Password changed successfully.
      </div>
      <div id="pw-error" class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>

      <form id="pw-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="pw-current">Current Password</label>
          <input id="pw-current" type="password" required autocomplete="current-password"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="pw-new">New Password <span class="text-gray-400 font-normal">(min. 8 characters)</span></label>
          <input id="pw-new" type="password" required autocomplete="new-password" minlength="8"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="pw-confirm">Confirm New Password</label>
          <input id="pw-confirm" type="password" required autocomplete="new-password"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" id="pw-btn"
          class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold px-6 py-2.5 rounded-xl text-sm transition">
          Update Password
        </button>
      </form>
    </div>

  </main>

{{end}}
