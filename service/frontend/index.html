<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Trainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Navigation -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <span class="text-xl font-bold text-gray-800">词汇训练 · Vocab Trainer</span>
      <select id="lang-select" class="text-sm border border-gray-200 rounded-lg px-2 py-1 bg-white text-gray-600 cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="en">🇬🇧</option>
        <option value="zh">🇨🇳</option>
      </select>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md">

      <!-- HIBP warning banner (shown after login with compromised password) -->
      <div id="hibp-warning" class="hidden mb-4 bg-amber-50 border border-amber-300 rounded-xl p-4">
        <p class="text-amber-800 text-sm font-medium mb-2">⚠️ Your password has appeared in a data breach. We recommend changing it.</p>
        <a href="/settings" class="inline-block text-sm bg-amber-600 hover:bg-amber-700 text-white font-medium px-4 py-1.5 rounded-lg transition">Change Password</a>
      </div>

      <!-- Card -->
      <div class="bg-white rounded-2xl shadow p-8">

        <!-- Tabs -->
        <div class="flex gap-1 bg-gray-100 rounded-xl p-1 mb-8">
          <button id="tab-signin" onclick="showTab('signin')" class="flex-1 py-2 rounded-lg text-sm font-medium transition bg-white text-gray-800 shadow-sm">Sign In</button>
          <button id="tab-register" onclick="showTab('register')" class="flex-1 py-2 rounded-lg text-sm font-medium transition text-gray-500 hover:text-gray-800">Create Account</button>
        </div>

        <!-- Sign In panel -->
        <div id="panel-signin">
          <h2 class="text-lg font-semibold text-gray-800 mb-6">Welcome back</h2>

          <div id="signin-error" class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
          <div id="signin-info" class="hidden mb-4 text-sm text-blue-700 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2"></div>

          <form id="signin-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1" for="signin-email">Email</label>
              <input id="signin-email" type="email" required autocomplete="email"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1" for="signin-password">Password</label>
              <input id="signin-password" type="password" required autocomplete="current-password"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" id="signin-btn"
              class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-3 rounded-xl text-base transition">
              Sign In
            </button>
          </form>

          <p class="mt-5 text-center text-sm text-gray-500">
            New here?
            <button onclick="showTab('register')" class="text-blue-600 hover:underline font-medium">Create an account</button>
          </p>
        </div>

        <!-- Register panel -->
        <div id="panel-register" class="hidden">
          <h2 class="text-lg font-semibold text-gray-800 mb-6">Create your account</h2>

          <div id="register-error" class="hidden mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>

          <!-- Pending verification screen -->
          <div id="register-pending" class="hidden text-center py-4">
            <div class="text-4xl mb-4">📧</div>
            <h3 class="text-base font-semibold text-gray-800 mb-2">Check your inbox</h3>
            <p class="text-sm text-gray-500">We sent a confirmation link to <strong id="register-pending-email"></strong>. Click it to activate your account.</p>
          </div>

          <form id="register-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1" for="reg-email">Email</label>
              <input id="reg-email" type="email" required autocomplete="email"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1" for="reg-password">Password <span class="text-gray-400 font-normal">(min. 8 characters)</span></label>
              <input id="reg-password" type="password" required autocomplete="new-password" minlength="8"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1" for="reg-confirm">Confirm Password</label>
              <input id="reg-confirm" type="password" required autocomplete="new-password"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" id="register-btn"
              class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-3 rounded-xl text-base transition">
              Create Account
            </button>
          </form>

          <p class="mt-5 text-center text-sm text-gray-500">
            Already have an account?
            <button onclick="showTab('signin')" class="text-blue-600 hover:underline font-medium">Sign in</button>
          </p>
        </div>

      </div>
    </div>
  </main>

  <script>
    // Redirect to /train if already authenticated
    fetch('/api/auth/status').then(r => r.json()).then(d => {
      if (d.auth) {
        // Check actual session by calling /api/me (requires valid cookie)
        fetch('/api/me').then(r => {
          if (r.ok) window.location.replace('/train');
        });
      }
    }).catch(() => {});

    // Switch to register tab if URL hash is #register
    if (location.hash === '#register') showTab('register');

    function showTab(tab) {
      const isSignin = tab === 'signin';
      document.getElementById('tab-signin').className =
        'flex-1 py-2 rounded-lg text-sm font-medium transition ' +
        (isSignin ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-500 hover:text-gray-800');
      document.getElementById('tab-register').className =
        'flex-1 py-2 rounded-lg text-sm font-medium transition ' +
        (!isSignin ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-500 hover:text-gray-800');
      document.getElementById('panel-signin').classList.toggle('hidden', !isSignin);
      document.getElementById('panel-register').classList.toggle('hidden', isSignin);
      history.replaceState(null, '', isSignin ? '/' : '/#register');
    }

    // HIBP k-anonymity check
    async function isPasswordPwned(password) {
      if (!crypto?.subtle) return false;
      try {
        const buf = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(password));
        const hex = Array.from(new Uint8Array(buf))
          .map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
        const prefix = hex.slice(0, 5), suffix = hex.slice(5);
        const res = await fetch('https://api.pwnedpasswords.com/range/' + prefix,
          { headers: { 'Add-Padding': 'true' } });
        const text = await res.text();
        return text.split('\r\n').some(l => l.split(':')[0] === suffix);
      } catch {
        return false;
      }
    }

    // Sign In
    document.getElementById('signin-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('signin-error');
      const infoEl = document.getElementById('signin-info');
      errEl.classList.add('hidden');
      infoEl.classList.add('hidden');
      const btn = document.getElementById('signin-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          if (data.error === 'email_not_verified') {
            infoEl.textContent = 'Please check your inbox and click the confirmation link to activate your account.';
            infoEl.classList.remove('hidden');
          } else {
            errEl.textContent = data.error || 'Login failed. Please try again.';
            errEl.classList.remove('hidden');
          }
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        // Login successful — check HIBP in background, then redirect
        const pwned = await isPasswordPwned(password);
        if (pwned) {
          document.getElementById('hibp-warning').classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        window.location.replace('/train');
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // Register
    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('register-error');
      errEl.classList.add('hidden');
      const btn = document.getElementById('register-btn');

      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.remove('hidden');
        return;
      }
      if (password.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Checking password…';

      const pwned = await isPasswordPwned(password);
      if (pwned) {
        errEl.textContent = 'This password has appeared in a data breach. Please choose a different password.';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      btn.textContent = 'Creating account…';

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Registration failed. Please try again.';
          errEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Create Account';
          return;
        }

        if (data.auto_login) {
          window.location.replace(data.redirect || '/train');
          return;
        }

        // Show pending verification screen
        document.getElementById('register-form').classList.add('hidden');
        document.getElementById('register-pending-email').textContent = email;
        document.getElementById('register-pending').classList.remove('hidden');
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });

    // Show error from URL params (e.g. ?error=invalid_token from email verification)
    const urlParams = new URLSearchParams(location.search);
    const urlError = urlParams.get('error');
    if (urlError) {
      const errEl = document.getElementById('signin-error');
      if (urlError === 'invalid_token') {
        errEl.textContent = 'This verification link is invalid or has expired. Please register again.';
      } else {
        errEl.textContent = 'An error occurred. Please try again.';
      }
      errEl.classList.remove('hidden');
    }
  </script>
</body>
</html>
