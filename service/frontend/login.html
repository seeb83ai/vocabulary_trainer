<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Vocabulary Trainer</title>
  <script src="/tailwind.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm bg-white rounded-2xl shadow p-8">
    <div class="flex justify-end mb-4">
      <select id="lang-select" class="text-sm border border-gray-200 rounded-lg px-2 py-1 bg-white text-gray-600 cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="en">🇬🇧</option>
        <option value="zh">🇨🇳</option>
      </select>
    </div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center" data-i18n="login.title">词汇训练 · Vocab Trainer</h1>
    <p class="text-gray-500 text-center mb-8 text-sm" data-i18n="login.subtitle">Sign in to continue</p>

    <form id="login-form" class="flex flex-col gap-4">
      <input
        id="email"
        type="email"
        autocomplete="email"
        placeholder="Email"
        data-i18n-placeholder="login.email"
        class="border border-gray-300 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
      >
      <input
        id="password"
        type="password"
        autocomplete="current-password"
        placeholder="Password"
        data-i18n-placeholder="login.password"
        class="border border-gray-300 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
      >
      <p id="error-msg" class="hidden text-red-600 text-sm text-center"></p>
      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-3 rounded-xl text-lg transition"
        data-i18n="login.signIn"
      >
        Sign in
      </button>
    </form>
  </div>

  <script src="i18n.js"></script>
  <script>
    // Apply saved language on load
    const langSelect = document.getElementById('lang-select');
    langSelect.value = getUILang();
    applyTranslations();
    langSelect.addEventListener('change', () => {
      setUILang(langSelect.value);
      applyTranslations();
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const body = await res.json().catch(() => ({}));
          errEl.textContent = body.error || t('login.failed');
          errEl.classList.remove('hidden');
        }
      } catch (_) {
        errEl.textContent = t('login.networkError');
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
