{{template "layout" .}}
{{define "content"}}

  <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-8">

    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-200">
        <h2 class="text-lg font-semibold text-gray-800" data-i18n="mismatches.title">Confusion Pairs</h2>
        <p class="text-sm text-gray-500 mt-1" data-i18n="mismatches.subtitle">Words you confused with other known vocabulary.</p>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden text-center py-16 text-gray-400">
        <div class="text-4xl mb-3">🎉</div>
        <p class="font-medium" data-i18n="mismatches.noConfusions">No confusions recorded yet.</p>
      </div>

      <!-- Table -->
      <div id="table-wrap" class="hidden overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-600 uppercase text-xs tracking-wider">
            <tr>
              <th class="py-3 px-4 text-left" data-i18n="mismatches.wordTested">Word tested</th>
              <th class="py-3 px-4 text-left" data-i18n="mismatches.confusedWith">Confused with</th>
              <th class="py-3 px-4 text-left" data-i18n="mismatches.mode">Mode</th>
              <th class="py-3 px-4 text-left" data-i18n="mismatches.count">Count</th>
              <th class="py-3 px-4 text-left" data-i18n="mismatches.lastSeen">Last seen</th>
            </tr>
          </thead>
          <tbody id="mismatches-tbody"></tbody>
        </table>
      </div>
    </div>

  </main>

{{end}}
