# Nginx reverse-proxy configuration for vocab-trainer
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/vocab-trainer
#   sudo ln -s /etc/nginx/sites-available/vocab-trainer /etc/nginx/sites-enabled/vocab-trainer
#   sudo nginx -t && sudo systemctl reload nginx
#
# The Go binary listens on 127.0.0.1:8080.
# Adjust server_name and the port if needed.

server {
    listen 80;
    server_name raspberrypi.local;   # replace with your hostname or IP

    # Optional: redirect to HTTPS if you add a cert later
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Reasonable timeouts for a local Pi
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
